services:
  postgres:
    image: postgres:16
    container_name: verblayer-postgres
    environment:
      POSTGRES_USER: verblayer
      POSTGRES_PASSWORD: verblayer
      POSTGRES_DB: verblayer
    ports:
      - "55432:5432"
    volumes:
      - verblayer_pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: verblayer-redis
    ports:
      - "56379:6379"
    volumes:
      - verblayer_redis_data:/data

volumes:
  verblayer_pg_data:
  verblayer_redis_data:
